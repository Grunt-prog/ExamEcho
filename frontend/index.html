<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Architect Assistant | Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode (Default) - Neon Cyberpunk */
            --bg-main: #0a0a1a;
            --bg-sidebar: rgba(10, 10, 26, 0.8);
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --accent-primary: #a855f7; /* Electric Purple */
            --accent-secondary: #06b6d4; /* Cyan */
            --accent-pink: #ec4899;
            --border-glow: rgba(168, 85, 247, 0.3);
            --glass-blur: blur(12px);
            --shadow-glow: 0 0 20px rgba(168, 85, 247, 0.15);
            --input-bg: rgba(255, 255, 255, 0.03);
            --msg-user-bg: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            --msg-ai-bg: rgba(255, 255, 255, 0.05);
        }

        body.light-mode {
            --bg-main: #f8faff;
            --bg-sidebar: rgba(248, 250, 255, 0.85);
            --bg-card: #ffffff;
            --text-primary: #1e1e30;
            --text-secondary: #64748b;
            --accent-primary: #7c3aed;
            --accent-secondary: #0891b2;
            --border-glow: rgba(124, 58, 237, 0.1);
            --shadow-glow: 0 10px 30px rgba(124, 58, 237, 0.1);
            --input-bg: #ffffff;
            --msg-user-bg: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            --msg-ai-bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1, h2, .header-title { font-family: 'Outfit', sans-serif; }

        /* Animated Background Mesh */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
        }

        /* Header */
        .header {
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-glow);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        
        .header-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-status { display: flex; gap: 16px; align-items: center; }
        .status-item { 
            display: flex; align-items: center; gap: 8px; 
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #475569; position: relative; }
        .status-dot.connected { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .theme-toggle:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }

        /* App Layout */
        .app-shell { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-glow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
        }

        .sidebar.hidden { transform: translateX(-100%); width: 0; padding: 0; overflow: hidden; }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; }
        .sidebar-title { font-size: 14px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        
        .sidebar-list { 
            display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; 
            padding-right: 4px;
        }
        
        .sidebar-item {
            background: var(--bg-card);
            border: 1px solid transparent;
            padding: 12px 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            group: hover;
        }

        .sidebar-item:hover {
            border-color: var(--border-glow);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .sidebar-question {
            flex: 1; font-size: 13px; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Tooltip style on hover */
        .sidebar-item:hover::after {
            content: attr(data-fulltext);
            position: absolute;
            left: 100%; top: 50%; transform: translateY(-50%);
            margin-left: 15px;
            padding: 10px 14px;
            background: #1a1a2e;
            color: white;
            border-radius: 8px;
            font-size: 12px;
            width: 250px;
            white-space: normal;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border-glow);
            pointer-events: none;
            opacity: 1;
        }

        .sidebar-delete {
            opacity: 0;
            width: 28px; height: 28px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: 0.2s;
        }

        .sidebar-item:hover .sidebar-delete { opacity: 1; }
        .sidebar-delete:hover { background: #ef4444; color: white; transform: scale(1.1); }

        /* Main Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 40px 10%;
            display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth;
        }

        .empty-state {
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-secondary); gap: 20px;
        }
        .empty-icon { font-size: 64px; filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.3)); }

        .message-group { display: flex; gap: 16px; margin-bottom: 8px; animation: slideUp 0.4s ease-out; }
        .message-group.user { justify-content: flex-end; }

        .message {
            max-width: 80%; padding: 16px 20px; border-radius: 20px;
            font-size: 15px; line-height: 1.6; position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .message.user {
            background: var(--msg-user-bg);
            color: white; border-bottom-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.2);
        }

        .message.assistant {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* Input Bar */
        .input-footer {
            padding: 30px 10%;
            background: linear-gradient(to top, var(--bg-main) 80%, transparent);
        }

        .input-wrapper {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-glow);
            transition: focus-within 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 25px rgba(168, 85, 247, 0.3); }

        input[type="text"] {
            flex: 1; background: transparent; border: none; padding: 12px;
            color: var(--text-primary); font-family: inherit; font-size: 15px;
        }
        input[type="text"]:focus { outline: none; }

        .btn-circle {
            width: 44px; height: 44px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: 0.3s;
            font-size: 18px;
        }

        .btn-ask { background: var(--accent-primary); color: white; }
        .btn-ask:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 15px var(--accent-primary); }

        .btn-mic { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-glow); }
        .btn-mic.recording { background: #ef4444; color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nav Toggle */
        .nav-toggle {
            background: var(--bg-card); border: 1px solid var(--border-glow);
            color: var(--text-primary); width: 40px; height: 40px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Animations */
        .loading-dots { display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; background: var(--accent-primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; box-shadow: 30px 0 60px rgba(0,0,0,0.5); }
            .chat-container, .input-footer { padding: 20px 20px; }
            .message { max-width: 90%; }
        }

        /* Trash Icon SVG */
        .icon-trash { width: 16px; height: 16px; fill: currentColor; }

        /* Stop button — hidden by default */
        .btn-stop {
            background: #f59e0b; color: white;
            display: none;
        }
        .btn-stop.visible { display: flex; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-glow"></div>
    
    <header class="header">
        <div class="header-left">
            <button class="nav-toggle" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="header-title">AWS Architect PRO</div>
            <div class="header-status">
                <div class="status-item">
                    <div class="status-dot" id="openaiStatus"></div>
                    <span>OpenAI</span>
                </div>
                <div class="status-item">
                    <div class="status-dot" id="notionStatus"></div>
                    <span>Notion</span>
                </div>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">☀️</button>
    </header>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Recent Queries</h2>
            </div>
            <div class="sidebar-list" id="sidebarList">
                <!-- Items added dynamically -->
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="empty-state">
                    <div class="empty-icon">🏗️</div>
                    <h2 style="font-size: 24px;">Architecting the Cloud</h2>
                    <p style="color: var(--text-secondary);">Ask about AWS services, best practices, or exam prep.</p>
                </div>
            </div>

            <div class="input-footer">
                <div id="loading" style="display: none; padding: 10px; margin-bottom: 10px;">
                    <div class="loading-dots">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
                <div id="statusMessage" class="status-message" style="margin-bottom: 10px; font-size: 13px;"></div>
                
                <div class="input-wrapper">
                    <input type="text" id="questionInput" placeholder="How do I secure an S3 bucket?" autocomplete="off" />
                    <button class="btn-circle btn-stop" id="stopBtn" onclick="stopSpeaking()" title="Stop Speaking">⏹️</button>
                    <button class="btn-circle btn-mic" id="micBtn" onclick="toggleMicrophone()">🎤</button>
                    <button class="btn-circle btn-ask" onclick="askQuestion()">🚀</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let recognition;
        let isRecording = false;
        let isSpeaking = false;
        let stopRequested = false;
        let conversationHistory = [];
        let chatItems = [];

        function stopSpeaking() {
            stopRequested = true;
            speechSynthesis.cancel();
            isSpeaking = false;
            document.getElementById('stopBtn').classList.remove('visible');
        }

        function readAloud(text) {
            if ('speechSynthesis' in window) {
                stopRequested = false;
                speechSynthesis.cancel();
                
                // Fix for SynthesisUtterance - check if window.SpeechSynthesisUtterance exists
                const SpeechUtterance = window.SpeechSynthesisUtterance || window.webkitSpeechSynthesisUtterance;
                if (!SpeechUtterance) return;
                
                const utt = new SpeechUtterance(text);
                utt.rate = 1;
                utt.pitch = 1;
                utt.volume = 1;
                isSpeaking = true;
                document.getElementById('stopBtn').classList.add('visible');

                utt.onend = () => {
                    isSpeaking = false;
                    document.getElementById('stopBtn').classList.remove('visible');
                };
                utt.onerror = () => {
                    isSpeaking = false;
                    document.getElementById('stopBtn').classList.remove('visible');
                };

                speechSynthesis.speak(utt);
            }
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function addQuestionToSidebar(question, notionBlockId) {
            chatItems.unshift({ question, notionBlockId });
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';

            chatItems.forEach((item) => {
                const row = document.createElement('div');
                row.className = 'sidebar-item';
                row.setAttribute('data-fulltext', item.question);

                const icon = document.createElement('span');
                icon.textContent = '🔹';
                row.appendChild(icon);

                const title = document.createElement('span');
                title.className = 'sidebar-question';
                title.textContent = item.question;
                row.appendChild(title);

                if (item.notionBlockId) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'sidebar-delete';
                    deleteBtn.innerHTML = `<svg class="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm2 3h14v13H5V9zm3 2v9h2v-9H8zm4 0v9h2v-9h-2zm4 0v9h2v-9h-2zM9 2h6l1 2H8l1-2z"/></svg>`;
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        removeFromNotion(item.notionBlockId, deleteBtn, true);
                    };
                    row.appendChild(deleteBtn);
                }
                list.appendChild(row);
            });
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const empty = container.querySelector('.empty-state');
            if (empty) empty.remove();

            const group = document.createElement('div');
            group.className = `message-group ${role}`;
            
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = content;
            
            group.appendChild(msg);
            container.appendChild(group);
            container.scrollTop = container.scrollHeight;
        }

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            if (isSpeaking) stopSpeaking();

            addMessage('user', question);
            input.value = '';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, conversation_history: conversationHistory })
                });

                const data = await response.json();
                document.getElementById('loading').style.display = 'none';

                if (response.ok) {
                    addMessage('assistant', data.answer);
                    addQuestionToSidebar(question, data.notion_block_id);
                    conversationHistory.push({ role: 'user', content: question });
                    conversationHistory.push({ role: 'assistant', content: data.answer });
                    
                    const status = document.getElementById('statusMessage');
                    status.textContent = data.message;
                    status.style.color = data.added_to_notion ? '#10b981' : '#f59e0b';

                    readAloud(data.answer);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                addMessage('assistant', "System error. Please verify backend.");
            }
        }

        async function removeFromNotion(blockId, btn, fromSidebar) {
            if (!confirm('Permanently delete from Notion?')) return;
            
            btn.innerHTML = `<span style="font-size:10px">...</span>`;
            try {
                const res = await fetch(`${API_BASE}/remove-notion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ block_id: blockId })
                });
                if (res.ok) {
                    chatItems = chatItems.filter(i => i.notionBlockId !== blockId);
                    renderSidebar();
                    document.getElementById('statusMessage').textContent = "Removed from Notion";
                }
            } catch (e) {
                btn.innerHTML = `!`;
            }
        }

        // Voice Setup
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); };
            recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
            recognition.onresult = (event) => {
                document.getElementById('questionInput').value = event.results[0][0].transcript;
                askQuestion();
            };
        }

        function toggleMicrophone() {
            if (!recognition) return alert("Browser not supported");
            if (isSpeaking) stopSpeaking();
            if (isRecording) recognition.stop();
            else {
                document.getElementById('questionInput').value = '';
                recognition.start();
            }
        }

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                document.getElementById('openaiStatus').className = `status-dot ${data.openai}`;
                document.getElementById('notionStatus').className = `status-dot ${data.notion}`;
            } catch {}
        }

        document.getElementById('questionInput').onkeypress = (e) => { if(e.key==='Enter') askQuestion(); };
        setInterval(checkHealth, 5000);
        checkHealth();
    </script>
</body>
</html>
